name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure deploy hook is configured
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing VERCEL_DEPLOY_HOOK_URL secret. Please add the Vercel deploy hook URL in GitHub repository secrets."
            exit 1
          fi

      - name: Trigger Vercel deployment
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --show-error --silent -X POST "$VERCEL_DEPLOY_HOOK_URL"
