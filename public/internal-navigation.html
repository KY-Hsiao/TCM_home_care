<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google 內嵌導航</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:#eaf4f0;color:#172033}.wrap{min-height:100vh;padding:12px;box-sizing:border-box;display:grid;grid-template-rows:auto minmax(390px,1fr) auto;gap:10px}.panel{border-radius:22px;background:#fff;box-shadow:0 12px 30px rgba(15,23,42,.14);overflow:hidden}.head{padding:14px 16px}.eyebrow{margin:0;color:#d76a5f;font-size:12px;font-weight:800;letter-spacing:.16em}h1{margin:6px 0 4px;font-size:25px}.hint{margin:0;color:#64748b;font-size:13px;line-height:1.5}.map-panel{position:relative;min-height:390px}.map{height:58vh;min-height:390px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}.metric{border-radius:16px;background:#f1f5f9;padding:9px 11px}.metric span{display:block;color:#64748b;font-size:11px;font-weight:800;letter-spacing:.08em}.metric strong{display:block;margin-top:4px;font-size:16px}.instructions{max-height:32vh;overflow:auto;padding:10px 14px;border-top:1px solid #e2e8f0}.instructions:empty:before{content:'正在計算路線與導航指示';color:#64748b;font-size:14px}.adp,.adp table{font-family:inherit}.adp-placemark{border-radius:14px;overflow:hidden}.status{padding:10px 14px;border-top:1px solid #e2e8f0;color:#64748b;font-size:13px;line-height:1.5}.warning{border-radius:18px;background:#fff7ed;color:#9a3412;margin:10px;padding:12px 14px;font-size:13px;line-height:1.6}.hidden{display:none}@media(max-width:560px){.wrap{padding:8px}.metrics{grid-template-columns:1fr}.map{height:56vh;min-height:360px}.instructions{max-height:36vh}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="head">
        <p class="eyebrow">Google 內嵌導航</p>
        <h1>依 Google 路線指示前進</h1>
        <p class="hint">本畫面留在程式內，使用 Google Maps JavaScript API 計算路線、顯示地圖與逐步方向指示。抵達後請按外層「已抵達」。</p>
      </div>
    </section>
    <section class="panel map-panel">
      <div id="map" class="map"></div>
      <div id="fallback" class="warning hidden"></div>
      <div class="metrics">
        <div class="metric"><span>距離</span><strong id="distanceText">等待定位</strong></div>
        <div class="metric"><span>時間</span><strong id="durationText">—</strong></div>
        <div class="metric"><span>模式</span><strong>開車</strong></div>
      </div>
      <div id="directionsPanel" class="instructions"></div>
      <div id="statusText" class="status">正在啟動 Google 內嵌導航。</div>
    </section>
  </main>
  <script>
    const params=new URLSearchParams(location.search);
    const key=params.get('key')||'';
    const destinationText=params.get('destination')||'目的地';
    const dlat=Number(params.get('dlat'));
    const dlng=Number(params.get('dlng'));
    let olat=Number(params.get('olat'));
    let olng=Number(params.get('olng'));
    const hasDest=Number.isFinite(dlat)&&Number.isFinite(dlng);
    const hasOrigin=Number.isFinite(olat)&&Number.isFinite(olng);
    const $=id=>document.getElementById(id);
    let map,directionsService,directionsRenderer,currentMarker,lastRouteAt=0,lastOrigin=null;
    function setStatus(text){$('statusText').textContent=text;}
    function showFallback(text){$('fallback').classList.remove('hidden');$('fallback').textContent=text;setStatus(text);}
    function fmtMeters(m){return m>=1000?(m/1000).toFixed(1)+' 公里':Math.round(m)+' 公尺';}
    function loadGoogle(){if(!key){showFallback('缺少 Google Maps API key，無法啟動 Google 內嵌導航。請在行政端或環境變數設定 Google Maps API key，並啟用 Maps JavaScript API 與 Directions API。');return;}const s=document.createElement('script');s.src='https://maps.googleapis.com/maps/api/js?key='+encodeURIComponent(key)+'&callback=initMap&libraries=routes&language=zh-TW';s.async=true;s.defer=true;s.onerror=()=>showFallback('Google Maps JavaScript API 載入失敗，請確認 API key、網域限制與啟用服務。');document.head.appendChild(s);}
    window.initMap=()=>{if(!hasDest){showFallback('目的地缺少座標，無法計算導航路線。請先補座標。');return;}const dest={lat:dlat,lng:dlng};const start=hasOrigin?{lat:olat,lng:olng}:dest;map=new google.maps.Map($('map'),{center:start,zoom:16,mapTypeControl:false,streetViewControl:false,fullscreenControl:false});directionsService=new google.maps.DirectionsService();directionsRenderer=new google.maps.DirectionsRenderer({map,panel:$('directionsPanel'),suppressMarkers:false,preserveViewport:false});new google.maps.Marker({position:dest,map,label:'目的地'});if(hasOrigin){updateOrigin(start.lat,start.lng,true);}setStatus('Google 內嵌導航已啟動，正在等待即時定位。');startWatch();};
    function updateOrigin(lat,lng,force){const origin={lat,lng};if(!currentMarker){currentMarker=new google.maps.Marker({position:origin,map,label:'目前',icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:6,fillColor:'#2563eb',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}});}else{currentMarker.setPosition(origin);}map.setCenter(origin);const now=Date.now();const moved=!lastOrigin||google.maps.geometry?true:true;if(force||now-lastRouteAt>12000){route(origin);lastRouteAt=now;lastOrigin=origin;}}
    function route(origin){const dest={lat:dlat,lng:dlng};directionsService.route({origin,destination:dest,travelMode:google.maps.TravelMode.DRIVING,unitSystem:google.maps.UnitSystem.METRIC},(result,status)=>{if(status==='OK'&&result){directionsRenderer.setDirections(result);const leg=result.routes[0]?.legs[0];if(leg){$('distanceText').textContent=leg.distance?.text||'—';$('durationText').textContent=leg.duration?.text||'—';setStatus('路線已更新；請依地圖與下方逐步指示前進。');}}else{showFallback('Google 無法計算路線：'+status);}});}
    function startWatch(){if(!navigator.geolocation){showFallback('此瀏覽器不支援定位，無法進行即時導航。');return;}navigator.geolocation.watchPosition(pos=>{updateOrigin(pos.coords.latitude,pos.coords.longitude,false);},err=>{setStatus('定位尚未授權或暫時失敗：'+err.message+'。請允許瀏覽器定位。');},{enableHighAccuracy:true,maximumAge:5000,timeout:12000});}
    loadGoogle();
  </script>
</body>
</html>
