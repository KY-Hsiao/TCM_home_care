<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>內嵌導航</title><style>html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:#0f172a}.nav{position:relative;height:100vh;width:100vw;overflow:hidden}.map{position:absolute;inset:0;height:100%;width:100%}.top{position:absolute;z-index:4;left:12px;right:12px;top:calc(env(safe-area-inset-top,0px) + 12px);border-radius:24px;background:rgba(15,23,42,.92);color:#fff;padding:16px;box-shadow:0 14px 34px rgba(15,23,42,.32)}.top span{display:block;color:#bfdbfe;font-size:12px;font-weight:800;letter-spacing:.12em}.top strong{display:block;margin-top:5px;font-size:28px;line-height:1.18}.top small{display:block;margin-top:6px;color:#e0f2fe;font-size:13px}.bottom{position:absolute;z-index:4;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.box{border-radius:18px;background:rgba(255,255,255,.95);padding:10px 12px;box-shadow:0 10px 24px rgba(15,23,42,.2)}.box span{display:block;color:#64748b;font-size:11px;font-weight:800}.box strong{display:block;margin-top:4px;color:#172033;font-size:16px}.hidden{display:none}.warn{position:absolute;z-index:5;left:12px;right:12px;top:50%;transform:translateY(-50%);border-radius:20px;background:#fff7ed;color:#9a3412;padding:14px 16px;box-shadow:0 16px 38px rgba(15,23,42,.25)}#directionsPanel{display:none}@media(max-width:560px){.bottom{grid-template-columns:1fr 1fr}.box:last-child{grid-column:1/3}.top strong{font-size:24px}}</style></head><body><main class="nav"><div id="map" class="map"></div><div id="fallback" class="warn hidden"></div><section class="top"><span>前方動作</span><strong id="currentInstruction">等待定位</strong><small id="stepDistanceText">允許定位後開始導航</small></section><section class="bottom"><div class="box"><span>剩餘距離</span><strong id="distanceText">—</strong></div><div class="box"><span>剩餘時間</span><strong id="durationText">—</strong></div><div class="box"><span>速度</span><strong id="speedText">—</strong></div></section><div id="directionsPanel"></div></main><script>const q=new URLSearchParams(location.search),key=q.get('key')||'',mapId=q.get('mapId')||'',dlat=+q.get('dlat'),dlng=+q.get('dlng'),olat=+q.get('olat'),olng=+q.get('olng'),offset=+(q.get('headingOffset')||0),navZoom=+(q.get('navZoom')||17);const okDest=Number.isFinite(dlat)&&Number.isFinite(dlng),okOrigin=Number.isFinite(olat)&&Number.isFinite(olng),$=id=>document.getElementById(id);let map,svc,ren,me,leg,steps=[],idx=0,lastRoute=0,lastHeading=0,filtered,lastRaw,lastSpeedPos,lastSpeedAt,speed=0,wakeLock=null;const STEP=55,ARRIVE=70,REROUTE=28000,POS_A=.42,HEAD_A=.22,SPEED_A=.3;const CAR='M -10 -18 L 10 -18 L 15 -7 L 15 12 L 8 20 L -8 20 L -15 12 L -15 -7 Z M -6 -12 L 6 -12 L 9 -5 L -9 -5 Z';async function keepAwake(){try{if('wakeLock'in navigator&&document.visibilityState==='visible'&&!wakeLock){wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',()=>wakeLock=null)}}catch(e){}}document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')keepAwake()});window.addEventListener('pagehide',()=>{try{if(wakeLock)wakeLock.release()}catch(e){}});function warn(t){$('fallback').classList.remove('hidden');$('fallback').textContent=t}function clearWarn(){$('fallback').classList.add('hidden');$('fallback').textContent=''}function strip(h){const d=document.createElement('div');d.innerHTML=h||'';return d.textContent||''}function action(h){const s=strip(h).replace(/\s+/g,'');if(s.includes('迴轉')||s.includes('回轉'))return'迴轉';if(s.includes('左'))return'左轉';if(s.includes('右'))return'右轉';return'直行'}function rad(x){return x*Math.PI/180}function dist(a,b){const R=6371000,A=rad(b.lat-a.lat),B=rad(b.lng-a.lng),v=Math.sin(A/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(B/2)**2;return R*2*Math.atan2(Math.sqrt(v),Math.sqrt(1-v))}function p(ll){return{lat:ll.lat(),lng:ll.lng()}}function fmt(m){return !Number.isFinite(m)?'—':m>=1000?(m/1000).toFixed(1)+'公里':Math.round(m)+'公尺'}function remain(pos,i){if(!leg)return NaN;let t=steps[i]?dist(pos,p(steps[i].end_location)):0;for(let k=i+1;k<steps.length;k++)t+=steps[k].distance?.value||0;return t}function routeHeading(a,b){if(window.google&&google.maps.geometry)return(google.maps.geometry.spherical.computeHeading(new google.maps.LatLng(a.lat,a.lng),new google.maps.LatLng(b.lat,b.lng))+360)%360;return 0}function smoothHead(h){let d=((h-lastHeading+540)%360)-180;lastHeading=(lastHeading+d*HEAD_A+360)%360;return Math.round(lastHeading)}function smoothPos(r){if(!filtered){filtered=r;return r}if(dist(filtered,r)<4)return filtered;filtered={lat:filtered.lat+(r.lat-filtered.lat)*POS_A,lng:filtered.lng+(r.lng-filtered.lng)*POS_A};return filtered}function updSpeed(pos,now,s){let v=Number.isFinite(s)&&s>=0?s*3.6:null;if(v===null&&lastSpeedPos&&lastSpeedAt){const sec=(now-lastSpeedAt)/1000;if(sec>.6)v=dist(lastSpeedPos,pos)/sec*3.6}lastSpeedPos=pos;lastSpeedAt=now;if(v!==null&&Number.isFinite(v))speed=speed?speed*(1-SPEED_A)+v*SPEED_A:v}function car(h){return{path:CAR,scale:1,rotation:h,fillColor:'#2563eb',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,anchor:new google.maps.Point(0,0)}}function follow(pos,target){const predictedRouteHeading=(routeHeading(pos,target)+offset+360)%360,h=smoothHead(predictedRouteHeading);try{map.panTo(pos);map.setZoom(navZoom);map.setTilt(45);map.setHeading(h)}catch(e){map.setCenter(pos)}if(me)me.setIcon(car(h))}function nav(pos){if(!leg||!steps.length)return;const dest=p(leg.end_location),toDest=dist(pos,dest);if(toDest<=ARRIVE){$('currentInstruction').textContent='已接近目的地';$('stepDistanceText').textContent='可按已抵達';$('speedText').textContent=Math.round(speed)+' km/h';follow(pos,dest);return}while(idx<steps.length-1&&dist(pos,p(steps[idx].end_location))<=STEP)idx++;const st=steps[idx],end=p(st.end_location),toNext=dist(pos,end);follow(pos,end);$('currentInstruction').textContent=fmt(toNext)+'後'+action(st.instructions);$('stepDistanceText').textContent='';$('distanceText').textContent=fmt(remain(pos,idx));$('speedText').textContent=Math.round(speed)+' km/h'}function route(pos){svc.route({origin:pos,destination:{lat:dlat,lng:dlng},travelMode:google.maps.TravelMode.DRIVING,unitSystem:google.maps.UnitSystem.METRIC},(res,st)=>{if(st==='OK'&&res){clearWarn();ren.setDirections(res);leg=res.routes[0]?.legs[0];steps=leg?.steps||[];idx=0;if(leg){$('distanceText').textContent=leg.distance?.text||'—';$('durationText').textContent=leg.duration?.text||'—';nav(pos)}}else{clearWarn();$('currentInstruction').textContent='請依地圖前進';$('stepDistanceText').textContent=''}})}function update(lat,lng,force,acc,spd){const raw={lat,lng},now=Date.now();if(acc&&acc>90&&filtered)return;const pos=force?raw:smoothPos(raw);updSpeed(pos,now,spd);if(lastRaw&&dist(lastRaw,raw)<1.5&&!force)return;lastRaw=raw;if(!me)me=new google.maps.Marker({position:pos,map,label:'醫師',icon:car(lastHeading)});else me.setPosition(pos);if(force||!leg||now-lastRoute>REROUTE){route(pos);lastRoute=now}else nav(pos)}window.initMap=()=>{keepAwake();if(!okDest){warn('目的地缺少座標');return}const start=okOrigin?{lat:olat,lng:olng}:{lat:dlat,lng:dlng};const opts={center:start,zoom:navZoom,tilt:45,heading:lastHeading,mapTypeControl:false,streetViewControl:false,fullscreenControl:false,zoomControl:false};if(mapId)opts.mapId=mapId;if(window.google&&google.maps.RenderingType)opts.renderingType=google.maps.RenderingType.VECTOR;map=new google.maps.Map($('map'),opts);svc=new google.maps.DirectionsService();ren=new google.maps.DirectionsRenderer({map,panel:$('directionsPanel'),suppressMarkers:false,preserveViewport:true});if(okOrigin)update(start.lat,start.lng,true,0,null);if(navigator.geolocation)navigator.geolocation.watchPosition(x=>update(x.coords.latitude,x.coords.longitude,false,x.coords.accuracy,x.coords.speed),()=>{}, {enableHighAccuracy:true,maximumAge:2000,timeout:10000})};if(!key)warn('缺少 Google Maps API key');else{const s=document.createElement('script');s.src='https://maps.googleapis.com/maps/api/js?key='+encodeURIComponent(key)+'&callback=initMap&libraries=geometry&language=zh-TW';s.async=true;s.defer=true;document.head.appendChild(s)}keepAwake();</script></body></html>
