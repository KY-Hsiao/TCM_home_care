<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google 內嵌導航</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:#eaf4f0;color:#172033}.wrap{min-height:100vh;padding:10px;box-sizing:border-box;display:grid;gap:10px}.panel{border-radius:22px;background:#fff;box-shadow:0 12px 30px rgba(15,23,42,.14);overflow:hidden}.head{padding:13px 15px}.eyebrow{margin:0;color:#d76a5f;font-size:12px;font-weight:800;letter-spacing:.16em}h1{margin:5px 0 4px;font-size:24px}.hint{margin:0;color:#64748b;font-size:13px;line-height:1.5}.nav-card{margin:10px;border-radius:22px;background:#172033;color:#fff;padding:16px}.nav-card span{display:block;color:#bfdbfe;font-size:12px;font-weight:800;letter-spacing:.1em}.nav-card strong{display:block;margin-top:5px;font-size:23px;line-height:1.25}.nav-card small{display:block;margin-top:8px;color:#e0f2fe;font-size:14px;line-height:1.45}.map{height:50vh;min-height:340px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}.metric{border-radius:16px;background:#f1f5f9;padding:9px 11px}.metric span{display:block;color:#64748b;font-size:11px;font-weight:800;letter-spacing:.08em}.metric strong{display:block;margin-top:4px;font-size:16px}.next-box{margin:0 10px 10px;border-radius:18px;background:#ecfdf5;color:#166534;padding:12px 14px;font-size:14px;line-height:1.5}.instructions{max-height:26vh;overflow:auto;padding:10px 14px;border-top:1px solid #e2e8f0}.instructions:empty:before{content:'正在計算逐步導航指示';color:#64748b;font-size:14px}.adp,.adp table{font-family:inherit}.status{padding:10px 14px;border-top:1px solid #e2e8f0;color:#64748b;font-size:13px;line-height:1.5}.warning{border-radius:18px;background:#fff7ed;color:#9a3412;margin:10px;padding:12px 14px;font-size:13px;line-height:1.6}.hidden{display:none}@media(max-width:560px){.metrics{grid-template-columns:1fr}.map{height:48vh;min-height:320px}.instructions{max-height:30vh}.nav-card strong{font-size:21px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="head"><p class="eyebrow">Google 內嵌導航</p><h1>即時導航中</h1><p class="hint">系統會依目前定位更新目前步驟、下一個轉向與剩餘距離。抵達後請按外層「已抵達」。</p></div>
      <div class="nav-card"><span>現在</span><strong id="currentInstruction">等待定位與路線</strong><small id="stepDistanceText">允許瀏覽器定位後會開始導航。</small></div>
    </section>
    <section class="panel">
      <div id="map" class="map"></div><div id="fallback" class="warning hidden"></div>
      <div class="metrics"><div class="metric"><span>剩餘距離</span><strong id="distanceText">等待定位</strong></div><div class="metric"><span>剩餘時間</span><strong id="durationText">—</strong></div><div class="metric"><span>下一動作</span><strong id="nextDistanceText">—</strong></div></div>
      <div id="nextInstruction" class="next-box">下一步：等待路線計算。</div><div id="directionsPanel" class="instructions"></div><div id="statusText" class="status">正在啟動 Google 內嵌導航。</div>
    </section>
  </main>
  <script>
    const params=new URLSearchParams(location.search),key=params.get('key')||'',dlat=Number(params.get('dlat')),dlng=Number(params.get('dlng')),olat=Number(params.get('olat')),olng=Number(params.get('olng'));const hasDest=Number.isFinite(dlat)&&Number.isFinite(dlng),hasOrigin=Number.isFinite(olat)&&Number.isFinite(olng),$=id=>document.getElementById(id);let map,svc,ren,me,leg=null,steps=[],stepIndex=0,lastRouteAt=0;const STEP_M=55,ARRIVE_M=70,REROUTE_MS=25000;function setStatus(t){$('statusText').textContent=t}function showFallback(t){$('fallback').classList.remove('hidden');$('fallback').textContent=t;setStatus(t)}function strip(h){const d=document.createElement('div');d.innerHTML=h||'';return d.textContent||'沿路線前進'}function rad(x){return x*Math.PI/180}function dist(a,b){const R=6371000,A=rad(b.lat-a.lat),B=rad(b.lng-a.lng),s=Math.sin(A/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(B/2)**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s))}function p(ll){return{lat:ll.lat(),lng:ll.lng()}}function fmt(m){return !Number.isFinite(m)?'等待定位':m>=1000?(m/1000).toFixed(1)+' 公里':Math.round(m)+' 公尺'}function remain(pos,i){if(!leg||!steps.length)return null;let t=steps[i]?dist(pos,p(steps[i].end_location)):0;for(let k=i+1;k<steps.length;k++)t+=steps[k].distance?.value||0;return t}function nav(pos){if(!leg||!steps.length)return;const destination=p(leg.end_location),toDest=dist(pos,destination);if(toDest<=ARRIVE_M){$('currentInstruction').textContent='已接近目的地';$('stepDistanceText').textContent='可按外層「已抵達」寫入抵達時間。';$('nextInstruction').textContent='下一步：抵達目的地。';$('nextDistanceText').textContent='抵達';setStatus('已接近目的地，請確認是否抵達。');return}while(stepIndex<steps.length-1&&dist(pos,p(steps[stepIndex].end_location))<=STEP_M)stepIndex++;const s=steps[stepIndex],n=steps[stepIndex+1],toNext=dist(pos,p(s.end_location));$('currentInstruction').textContent=strip(s.instructions);$('stepDistanceText').textContent='距離下一個動作約 '+fmt(toNext);$('nextDistanceText').textContent=fmt(toNext);$('distanceText').textContent=fmt(remain(pos,stepIndex));$('nextInstruction').textContent='下一步：'+(n?strip(n.instructions):'抵達目的地');setStatus('導航中：目前步驟會依 GPS 持續更新。')}function loadGoogle(){if(!key){showFallback('缺少 Google Maps API key，無法啟動導航。請啟用 Maps JavaScript API 與 Directions API。');return}const s=document.createElement('script');s.src='https://maps.googleapis.com/maps/api/js?key='+encodeURIComponent(key)+'&callback=initMap&language=zh-TW';s.async=true;s.defer=true;s.onerror=()=>showFallback('Google Maps JavaScript API 載入失敗。');document.head.appendChild(s)}window.initMap=()=>{if(!hasDest){showFallback('目的地缺少座標，無法導航。');return}const dest={lat:dlat,lng:dlng},start=hasOrigin?{lat:olat,lng:olng}:dest;map=new google.maps.Map($('map'),{center:start,zoom:17,mapTypeControl:false,streetViewControl:false,fullscreenControl:false});svc=new google.maps.DirectionsService();ren=new google.maps.DirectionsRenderer({map,panel:$('directionsPanel'),suppressMarkers:false,preserveViewport:false});if(hasOrigin)update(start.lat,start.lng,true);setStatus('Google 內嵌導航已啟動，等待即時定位。');watch()};function update(lat,lng,force){const pos={lat,lng};if(!me)me=new google.maps.Marker({position:pos,map,label:'目前'});else me.setPosition(pos);map.setCenter(pos);const now=Date.now();if(force||!leg||now-lastRouteAt>REROUTE_MS){route(pos);lastRouteAt=now}else nav(pos)}function route(pos){svc.route({origin:pos,destination:{lat:dlat,lng:dlng},travelMode:google.maps.TravelMode.DRIVING,unitSystem:google.maps.UnitSystem.METRIC},(res,st)=>{if(st==='OK'&&res){ren.setDirections(res);leg=res.routes[0]?.legs[0]||null;steps=leg?.steps||[];stepIndex=0;if(leg){$('distanceText').textContent=leg.distance?.text||'—';$('durationText').textContent=leg.duration?.text||'—';nav(pos)}}else showFallback('Google 無法計算路線：'+st)})}function watch(){if(!navigator.geolocation){showFallback('此瀏覽器不支援定位，無法導航。');return}navigator.geolocation.watchPosition(x=>update(x.coords.latitude,x.coords.longitude,false),e=>setStatus('定位尚未授權或暫時失敗：'+e.message),{enableHighAccuracy:true,maximumAge:3000,timeout:12000})}loadGoogle();
  </script>
</body>
</html>
