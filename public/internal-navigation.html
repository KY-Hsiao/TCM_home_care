<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google 內嵌導航</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:#eaf4f0;color:#172033}.wrap{min-height:100vh;padding:10px;box-sizing:border-box;display:grid;gap:10px}.panel{border-radius:22px;background:#fff;box-shadow:0 12px 30px rgba(15,23,42,.14);overflow:hidden}.head{padding:13px 15px}.eyebrow{margin:0;color:#d76a5f;font-size:12px;font-weight:800;letter-spacing:.16em}h1{margin:5px 0 4px;font-size:24px}.hint{margin:0;color:#64748b;font-size:13px;line-height:1.5}.nav-card{margin:10px;border-radius:22px;background:#172033;color:#fff;padding:16px}.nav-card span{display:block;color:#bfdbfe;font-size:12px;font-weight:800;letter-spacing:.1em}.nav-card strong{display:block;margin-top:5px;font-size:23px;line-height:1.25}.nav-card small{display:block;margin-top:8px;color:#e0f2fe;font-size:14px;line-height:1.45}.map{height:56vh;min-height:390px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}.metric{border-radius:16px;background:#f1f5f9;padding:9px 11px}.metric span{display:block;color:#64748b;font-size:11px;font-weight:800;letter-spacing:.08em}.metric strong{display:block;margin-top:4px;font-size:16px}.next-box{margin:0 10px 10px;border-radius:18px;background:#ecfdf5;color:#166534;padding:12px 14px;font-size:14px;line-height:1.5}.instructions{max-height:24vh;overflow:auto;padding:10px 14px;border-top:1px solid #e2e8f0}.instructions:empty:before{content:'正在計算逐步導航指示';color:#64748b;font-size:14px}.adp,.adp table{font-family:inherit}.status{padding:10px 14px;border-top:1px solid #e2e8f0;color:#64748b;font-size:13px;line-height:1.5}.warning{border-radius:18px;background:#fff7ed;color:#9a3412;margin:10px;padding:12px 14px;font-size:13px;line-height:1.6}.hidden{display:none}@media(max-width:560px){.metrics{grid-template-columns:1fr}.map{height:54vh;min-height:360px}.instructions{max-height:28vh}.nav-card strong{font-size:21px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="head"><p class="eyebrow">Google 內嵌導航</p><h1>即時導航中</h1><p class="hint">地圖會近距離跟隨目前位置，並平滑旋轉視角；畫面上方盡量代表醫師正前方。</p></div>
      <div class="nav-card"><span>現在</span><strong id="currentInstruction">等待定位與路線</strong><small id="stepDistanceText">允許瀏覽器定位後會開始導航。</small></div>
    </section>
    <section class="panel">
      <div id="map" class="map"></div><div id="fallback" class="warning hidden"></div>
      <div class="metrics"><div class="metric"><span>剩餘距離</span><strong id="distanceText">等待定位</strong></div><div class="metric"><span>剩餘時間</span><strong id="durationText">—</strong></div><div class="metric"><span>前方動作</span><strong id="nextDistanceText">—</strong></div></div>
      <div id="nextInstruction" class="next-box">下一步：等待路線計算。</div><div id="directionsPanel" class="instructions"></div><div id="statusText" class="status">正在啟動 Google 內嵌導航。</div>
    </section>
  </main>
  <script>
    const params=new URLSearchParams(location.search),key=params.get('key')||'',dlat=Number(params.get('dlat')),dlng=Number(params.get('dlng')),olat=Number(params.get('olat')),olng=Number(params.get('olng'));
    const HEADING_OFFSET=Number(params.get('headingOffset')||'0');
    const hasDest=Number.isFinite(dlat)&&Number.isFinite(dlng),hasOrigin=Number.isFinite(olat)&&Number.isFinite(olng),$=id=>document.getElementById(id);
    let map,svc,ren,me,leg=null,steps=[],stepIndex=0,lastRouteAt=0,lastHeading=0,filteredPos=null,lastRawPos=null,lastAcceptedAt=0;
    const STEP_M=55,ARRIVE_M=70,REROUTE_MS=28000,NAV_ZOOM=19,MIN_MOVE_M=4,MAX_BAD_ACCURACY=90,POS_ALPHA=.42,HEAD_ALPHA=.22;
    const CAR_PATH='M -10 -18 L 10 -18 L 15 -7 L 15 12 L 8 20 L -8 20 L -15 12 L -15 -7 Z M -6 -12 L 6 -12 L 9 -5 L -9 -5 Z';
    function setStatus(t){$('statusText').textContent=t}function showFallback(t){$('fallback').classList.remove('hidden');$('fallback').textContent=t;setStatus(t)}function strip(h){const d=document.createElement('div');d.innerHTML=h||'';return d.textContent||'沿路線前進'}function rad(x){return x*Math.PI/180}function dist(a,b){const R=6371000,A=rad(b.lat-a.lat),B=rad(b.lng-a.lng),s=Math.sin(A/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(B/2)**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s))}function p(ll){return{lat:ll.lat(),lng:ll.lng()}}function fmt(m){return !Number.isFinite(m)?'等待定位':m>=1000?(m/1000).toFixed(1)+' 公里':Math.round(m)+' 公尺'}function remain(pos,i){if(!leg||!steps.length)return null;let t=steps[i]?dist(pos,p(steps[i].end_location)):0;for(let k=i+1;k<steps.length;k++)t+=steps[k].distance?.value||0;return t}
    function heading(pos,target){if(window.google&&google.maps.geometry){return (google.maps.geometry.spherical.computeHeading(new google.maps.LatLng(pos.lat,pos.lng),new google.maps.LatLng(target.lat,target.lng))+360)%360}const y=Math.sin(rad(target.lng-pos.lng))*Math.cos(rad(target.lat));const x=Math.cos(rad(pos.lat))*Math.sin(rad(target.lat))-Math.sin(rad(pos.lat))*Math.cos(rad(target.lat))*Math.cos(rad(target.lng-pos.lng));return (Math.atan2(y,x)*180/Math.PI+360)%360}
    function angleDelta(a,b){return ((b-a+540)%360)-180}function smoothHeading(next){const delta=angleDelta(lastHeading,next);lastHeading=(lastHeading+delta*HEAD_ALPHA+360)%360;return lastHeading}
    function smoothPosition(raw){if(!filteredPos){filteredPos=raw;return raw}const moved=dist(filteredPos,raw);if(moved<MIN_MOVE_M)return filteredPos;filteredPos={lat:filteredPos.lat+(raw.lat-filteredPos.lat)*POS_ALPHA,lng:filteredPos.lng+(raw.lng-filteredPos.lng)*POS_ALPHA};return filteredPos}
    function carIcon(rotation){return{path:CAR_PATH,scale:1,rotation,fillColor:'#2563eb',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,anchor:new google.maps.Point(0,0)}}
    function setFollowView(pos,target){const rawHeading=(heading(pos,target)+HEADING_OFFSET+360)%360;const displayHeading=Math.round(smoothHeading(rawHeading));if(map){try{map.panTo(pos);if(map.getZoom()<NAV_ZOOM)map.setZoom(NAV_ZOOM);map.setTilt(45);map.setHeading(displayHeading)}catch(e){map.setCenter(pos)}}if(me)me.setIcon(carIcon(displayHeading));return displayHeading}
    function nav(pos){if(!leg||!steps.length)return;const destination=p(leg.end_location),toDest=dist(pos,destination);if(toDest<=ARRIVE_M){$('currentInstruction').textContent='已接近目的地';$('stepDistanceText').textContent='可按外層「已抵達」寫入抵達時間。';$('nextInstruction').textContent='下一步：抵達目的地。';$('nextDistanceText').textContent='抵達';setFollowView(pos,destination);setStatus('已接近目的地，請確認是否抵達。');return}while(stepIndex<steps.length-1&&dist(pos,p(steps[stepIndex].end_location))<=STEP_M)stepIndex++;const s=steps[stepIndex],n=steps[stepIndex+1],stepEnd=p(s.end_location),toNext=dist(pos,stepEnd),h=setFollowView(pos,stepEnd);$('currentInstruction').textContent=strip(s.instructions);$('stepDistanceText').textContent='前方約 '+fmt(toNext)+'，車頭校正後方位 '+h+'°';$('nextDistanceText').textContent=fmt(toNext);$('distanceText').textContent=fmt(remain(pos,stepIndex));$('nextInstruction').textContent='下一步：'+(n?strip(n.instructions):'抵達目的地');setStatus('導航中：已啟用位置平滑、方向平滑與近距離跟隨視角。')}
    function loadGoogle(){if(!key){showFallback('缺少 Google Maps API key，無法啟動導航。請啟用 Maps JavaScript API 與 Directions API。');return}const s=document.createElement('script');s.src='https://maps.googleapis.com/maps/api/js?key='+encodeURIComponent(key)+'&callback=initMap&libraries=geometry&language=zh-TW';s.async=true;s.defer=true;s.onerror=()=>showFallback('Google Maps JavaScript API 載入失敗。');document.head.appendChild(s)}
    window.initMap=()=>{if(!hasDest){showFallback('目的地缺少座標，無法導航。');return}const dest={lat:dlat,lng:dlng},start=hasOrigin?{lat:olat,lng:olng}:dest;map=new google.maps.Map($('map'),{center:start,zoom:NAV_ZOOM,tilt:45,heading:lastHeading,mapTypeControl:false,streetViewControl:false,fullscreenControl:false,zoomControl:false});svc=new google.maps.DirectionsService();ren=new google.maps.DirectionsRenderer({map,panel:$('directionsPanel'),suppressMarkers:false,preserveViewport:false});if(hasOrigin)update(start.lat,start.lng,true,0);setStatus('Google 內嵌導航已啟動，等待即時定位。');watch()};
    function update(lat,lng,force,accuracy){const raw={lat,lng};const now=Date.now();if(accuracy&&accuracy>MAX_BAD_ACCURACY&&filteredPos){setStatus('GPS 精度較低，暫時維持上一個穩定位置。');return}const pos=force?raw:smoothPosition(raw);if(lastRawPos&&dist(lastRawPos,raw)<1.5&&!force)return;lastRawPos=raw;lastAcceptedAt=now;if(!me)me=new google.maps.Marker({position:pos,map,label:'醫師',icon:carIcon(lastHeading)});else me.setPosition(pos);if(force||!leg||now-lastRouteAt>REROUTE_MS){route(pos);lastRouteAt=now}else nav(pos)}
    function route(pos){svc.route({origin:pos,destination:{lat:dlat,lng:dlng},travelMode:google.maps.TravelMode.DRIVING,unitSystem:google.maps.UnitSystem.METRIC},(res,st)=>{if(st==='OK'&&res){ren.setDirections(res);leg=res.routes[0]?.legs[0]||null;steps=leg?.steps||[];stepIndex=0;if(leg){$('distanceText').textContent=leg.distance?.text||'—';$('durationText').textContent=leg.duration?.text||'—';nav(pos)}}else showFallback('Google 無法計算路線：'+st)})}
    function watch(){if(!navigator.geolocation){showFallback('此瀏覽器不支援定位，無法導航。');return}navigator.geolocation.watchPosition(x=>update(x.coords.latitude,x.coords.longitude,false,x.coords.accuracy),e=>setStatus('定位尚未授權或暫時失敗：'+e.message),{enableHighAccuracy:true,maximumAge:2000,timeout:10000})}loadGoogle();
  </script>
</body>
</html>
