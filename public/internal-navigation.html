<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google 內嵌導航</title>
  <style>
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:#0f172a;color:#172033}.nav{position:relative;height:100vh;width:100vw;overflow:hidden;background:#0f172a}.map{position:absolute;inset:0;height:100%;width:100%}.top-card{position:absolute;z-index:4;left:12px;right:12px;top:calc(env(safe-area-inset-top,0px) + 12px);border-radius:24px;background:rgba(15,23,42,.92);color:#fff;padding:15px 16px;box-shadow:0 14px 34px rgba(15,23,42,.32);backdrop-filter:blur(10px)}.top-card span{display:block;color:#bfdbfe;font-size:12px;font-weight:800;letter-spacing:.12em}.top-card strong{display:block;margin-top:5px;font-size:27px;line-height:1.18}.top-card small{display:block;margin-top:7px;color:#e0f2fe;font-size:14px;line-height:1.42}.bottom-card{position:absolute;z-index:4;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);display:grid;gap:8px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{border-radius:18px;background:rgba(255,255,255,.95);padding:10px 12px;box-shadow:0 10px 24px rgba(15,23,42,.2);backdrop-filter:blur(10px)}.metric span{display:block;color:#64748b;font-size:11px;font-weight:800;letter-spacing:.08em}.metric strong{display:block;margin-top:4px;font-size:16px;color:#172033}.status{border-radius:16px;background:rgba(255,255,255,.88);padding:9px 12px;color:#64748b;font-size:12px;line-height:1.45;box-shadow:0 8px 20px rgba(15,23,42,.16)}.warning{position:absolute;z-index:5;left:12px;right:12px;top:50%;transform:translateY(-50%);border-radius:20px;background:#fff7ed;color:#9a3412;padding:14px 16px;font-size:14px;line-height:1.6;box-shadow:0 16px 38px rgba(15,23,42,.25)}.hidden{display:none}.instructions{display:none}@media(max-width:560px){.top-card strong{font-size:24px}.metrics{grid-template-columns:1fr 1fr}.metric:last-child{grid-column:1/3}.map{height:100%}}
  </style>
</head>
<body>
  <main class="nav">
    <div id="map" class="map"></div>
    <div id="fallback" class="warning hidden"></div>
    <section class="top-card" aria-label="目前導航指示">
      <span>前方動作</span>
      <strong id="currentInstruction">等待定位與路線</strong>
      <small id="stepDistanceText">允許瀏覽器定位後會開始導航。</small>
    </section>
    <section class="bottom-card" aria-label="導航狀態">
      <div class="metrics">
        <div class="metric"><span>剩餘距離</span><strong id="distanceText">等待定位</strong></div>
        <div class="metric"><span>剩餘時間</span><strong id="durationText">—</strong></div>
        <div class="metric"><span>速度 / 視野</span><strong id="nextDistanceText">—</strong></div>
      </div>
      <div id="statusText" class="status">正在啟動 Google 內嵌導航。</div>
    </section>
    <div id="directionsPanel" class="instructions"></div>
  </main>
  <script>
    const params=new URLSearchParams(location.search),key=params.get('key')||'',dlat=Number(params.get('dlat')),dlng=Number(params.get('dlng')),olat=Number(params.get('olat')),olng=Number(params.get('olng'));
    const HEADING_OFFSET=Number(params.get('headingOffset')||'0');
    const MAX_NAV_ZOOM=Number(params.get('maxZoom')||'19');
    const MIN_NAV_ZOOM=Number(params.get('minZoom')||'16');
    const hasDest=Number.isFinite(dlat)&&Number.isFinite(dlng),hasOrigin=Number.isFinite(olat)&&Number.isFinite(olng),$=id=>document.getElementById(id);
    let map,svc,ren,me,leg=null,steps=[],stepIndex=0,lastRouteAt=0,lastHeading=0,filteredPos=null,lastRawPos=null,lastSpeedPos=null,lastSpeedAt=0,currentSpeedKmh=0,currentZoom=MAX_NAV_ZOOM;
    const STEP_M=55,ARRIVE_M=70,REROUTE_MS=28000,MIN_MOVE_M=4,MAX_BAD_ACCURACY=90,POS_ALPHA=.42,HEAD_ALPHA=.22,ZOOM_ALPHA=.35,SPEED_ALPHA=.30;
    const CAR_PATH='M -10 -18 L 10 -18 L 15 -7 L 15 12 L 8 20 L -8 20 L -15 12 L -15 -7 Z M -6 -12 L 6 -12 L 9 -5 L -9 -5 Z';
    function setStatus(t){$('statusText').textContent=t}function showFallback(t){$('fallback').classList.remove('hidden');$('fallback').textContent=t;setStatus(t)}function strip(h){const d=document.createElement('div');d.innerHTML=h||'';return d.textContent||'沿路線前進'}function rad(x){return x*Math.PI/180}function dist(a,b){const R=6371000,A=rad(b.lat-a.lat),B=rad(b.lng-a.lng),s=Math.sin(A/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(B/2)**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s))}function p(ll){return{lat:ll.lat(),lng:ll.lng()}}function fmt(m){return !Number.isFinite(m)?'等待定位':m>=1000?(m/1000).toFixed(1)+' 公里':Math.round(m)+' 公尺'}function remain(pos,i){if(!leg||!steps.length)return null;let t=steps[i]?dist(pos,p(steps[i].end_location)):0;for(let k=i+1;k<steps.length;k++)t+=steps[k].distance?.value||0;return t}
    function shortInstruction(text){const s=text.replace(/\s+/g,' ').trim();if(s.includes('迴轉')||s.includes('回轉'))return'迴轉';if(s.includes('靠左'))return'靠左';if(s.includes('靠右'))return'靠右';if(s.includes('左'))return'左轉';if(s.includes('右'))return'右轉';if(s.includes('出口'))return'下交流道';if(s.includes('直')||s.includes('繼續'))return'直行';return s||'沿路線前進'}
    function actionText(step,meter){return fmt(meter)+'後 '+shortInstruction(strip(step?.instructions||''))}
    function heading(pos,target){if(window.google&&google.maps.geometry){return (google.maps.geometry.spherical.computeHeading(new google.maps.LatLng(pos.lat,pos.lng),new google.maps.LatLng(target.lat,target.lng))+360)%360}const y=Math.sin(rad(target.lng-pos.lng))*Math.cos(rad(target.lat));const x=Math.cos(rad(pos.lat))*Math.sin(rad(target.lat))-Math.sin(rad(pos.lat))*Math.cos(rad(target.lat))*Math.cos(rad(target.lng-pos.lng));return (Math.atan2(y,x)*180/Math.PI+360)%360}
    function angleDelta(a,b){return ((b-a+540)%360)-180}function smoothHeading(next){const delta=angleDelta(lastHeading,next);lastHeading=(lastHeading+delta*HEAD_ALPHA+360)%360;return lastHeading}
    function smoothPosition(raw){if(!filteredPos){filteredPos=raw;return raw}const moved=dist(filteredPos,raw);if(moved<MIN_MOVE_M)return filteredPos;filteredPos={lat:filteredPos.lat+(raw.lat-filteredPos.lat)*POS_ALPHA,lng:filteredPos.lng+(raw.lng-filteredPos.lng)*POS_ALPHA};return filteredPos}
    function updateSpeed(pos,now,speedMps){let next=Number.isFinite(speedMps)&&speedMps>=0?speedMps*3.6:null;if(next===null&&lastSpeedPos&&lastSpeedAt){const sec=(now-lastSpeedAt)/1000;if(sec>.6)next=(dist(lastSpeedPos,pos)/sec)*3.6}lastSpeedPos=pos;lastSpeedAt=now;if(next!==null&&Number.isFinite(next)){currentSpeedKmh=currentSpeedKmh?currentSpeedKmh*(1-SPEED_ALPHA)+next*SPEED_ALPHA:next}return currentSpeedKmh}
    function targetZoom(speedKmh,toNext,toDest){if(toDest!==null&&toDest<220)return MAX_NAV_ZOOM;if(toNext!==null&&toNext<120)return MAX_NAV_ZOOM;if(speedKmh>=70)return Math.max(MIN_NAV_ZOOM,16);if(speedKmh>=45)return Math.max(MIN_NAV_ZOOM,17);if(speedKmh>=20)return Math.max(MIN_NAV_ZOOM,18);return MAX_NAV_ZOOM}
    function smoothZoom(next){currentZoom=currentZoom+(next-currentZoom)*ZOOM_ALPHA;return Math.round(currentZoom)}
    function carIcon(rotation){return{path:CAR_PATH,scale:1,rotation,fillColor:'#2563eb',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,anchor:new google.maps.Point(0,0)}}
    function setFollowView(pos,target,toNext=null,toDest=null){const rawHeading=(heading(pos,target)+HEADING_OFFSET+360)%360;const displayHeading=Math.round(smoothHeading(rawHeading));const z=smoothZoom(targetZoom(currentSpeedKmh,toNext,toDest));if(map){try{map.panTo(pos);map.setZoom(z);map.setTilt(45);map.setHeading(displayHeading)}catch(e){map.setCenter(pos)}}if(me)me.setIcon(carIcon(displayHeading));return {heading:displayHeading,zoom:z}}
    function nav(pos){if(!leg||!steps.length)return;const destination=p(leg.end_location),toDest=dist(pos,destination);if(toDest<=ARRIVE_M){$('currentInstruction').textContent='已接近目的地';$('stepDistanceText').textContent='可按外層「已抵達」寫入抵達時間。';$('nextDistanceText').textContent=Math.round(currentSpeedKmh)+' km/h / Z'+Math.round(currentZoom);setFollowView(pos,destination,toDest,toDest);setStatus('已接近目的地，請確認是否抵達。');return}while(stepIndex<steps.length-1&&dist(pos,p(steps[stepIndex].end_location))<=STEP_M)stepIndex++;const s=steps[stepIndex],stepEnd=p(s.end_location),toNext=dist(pos,stepEnd),view=setFollowView(pos,stepEnd,toNext,toDest);$('currentInstruction').textContent=actionText(s,toNext);$('stepDistanceText').textContent='請依地圖前進；畫面上方代表行進方向';$('nextDistanceText').textContent=Math.round(currentSpeedKmh)+' km/h / Z'+view.zoom;$('distanceText').textContent=fmt(remain(pos,stepIndex));setStatus('已簡化導航畫面：上方只顯示距離與左轉/右轉/直行。')}
    function loadGoogle(){if(!key){showFallback('缺少 Google Maps API key，無法啟動導航。請啟用 Maps JavaScript API 與 Directions API。');return}const s=document.createElement('script');s.src='https://maps.googleapis.com/maps/api/js?key='+encodeURIComponent(key)+'&callback=initMap&libraries=geometry&language=zh-TW';s.async=true;s.defer=true;s.onerror=()=>showFallback('Google Maps JavaScript API 載入失敗。');document.head.appendChild(s)}
    window.initMap=()=>{if(!hasDest){showFallback('目的地缺少座標，無法導航。');return}const dest={lat:dlat,lng:dlng},start=hasOrigin?{lat:olat,lng:olng}:dest;map=new google.maps.Map($('map'),{center:start,zoom:Math.round(currentZoom),tilt:45,heading:lastHeading,mapTypeControl:false,streetViewControl:false,fullscreenControl:false,zoomControl:false});svc=new google.maps.DirectionsService();ren=new google.maps.DirectionsRenderer({map,panel:$('directionsPanel'),suppressMarkers:false,preserveViewport:false});if(hasOrigin)update(start.lat,start.lng,true,0,null);setStatus('Google 內嵌導航已啟動，等待即時定位。');watch()};
    function update(lat,lng,force,accuracy,speedMps){const raw={lat,lng};const now=Date.now();if(accuracy&&accuracy>MAX_BAD_ACCURACY&&filteredPos){setStatus('GPS 精度較低，暫時維持上一個穩定位置。');return}const pos=force?raw:smoothPosition(raw);updateSpeed(pos,now,speedMps);if(lastRawPos&&dist(lastRawPos,raw)<1.5&&!force)return;lastRawPos=raw;if(!me)me=new google.maps.Marker({position:pos,map,label:'醫師',icon:carIcon(lastHeading)});else me.setPosition(pos);if(force||!leg||now-lastRouteAt>REROUTE_MS){route(pos);lastRouteAt=now}else nav(pos)}
    function route(pos){svc.route({origin:pos,destination:{lat:dlat,lng:dlng},travelMode:google.maps.TravelMode.DRIVING,unitSystem:google.maps.UnitSystem.METRIC},(res,st)=>{if(st==='OK'&&res){ren.setDirections(res);leg=res.routes[0]?.legs[0]||null;steps=leg?.steps||[];stepIndex=0;if(leg){$('distanceText').textContent=leg.distance?.text||'—';$('durationText').textContent=leg.duration?.text||'—';nav(pos)}}else showFallback('Google 無法計算路線：'+st)})}
    function watch(){if(!navigator.geolocation){showFallback('此瀏覽器不支援定位，無法導航。');return}navigator.geolocation.watchPosition(x=>update(x.coords.latitude,x.coords.longitude,false,x.coords.accuracy,x.coords.speed),e=>setStatus('定位尚未授權或暫時失敗：'+e.message),{enableHighAccuracy:true,maximumAge:2000,timeout:10000})}loadGoogle();
  </script>
</body>
</html>
